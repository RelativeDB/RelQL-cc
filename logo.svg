<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">RelationDB predictive database mark</title>
  <desc id="desc">A green stacked database crossed by a straight teal rising line with three relational nodes and an arrow.</desc>

  <!-- White silhouette: shows through the gaps as the separators between layers -->
  <path fill="#fff" d="M126 157h252v194c0 35-56.4 63-126 63s-126-28-126-63V157Z"/>
  <ellipse cx="252" cy="157" rx="126" ry="50" fill="#fff"/>

  <!-- Each database layer drawn as its own shape, separated by white gaps -->
  <g fill="#166a41">
    <!-- Top cap -->
    <path d="M126 157A126 50 0 0 1 378 157L378 178c-22 27-71 42-126 42s-104-15-126-42Z"/>
    <!-- Layer 2 -->
    <path d="M126 192c22 27 71 42 126 42s104-15 126-42L378 248c-22 27-71 42-126 42s-104-15-126-42Z"/>
    <!-- Layer 3 -->
    <path d="M126 262c22 27 71 42 126 42s104-15 126-42L378 318c-22 27-71 42-126 42s-104-15-126-42Z"/>
    <!-- Bottom layer -->
    <path d="M126 332c22 27 71 42 126 42s104-15 126-42L378 351c0 35-56.4 63-126 63s-126-28-126-63Z"/>
  </g>

  <!-- White halo so the graph reads over the database body (butt caps stay hidden under the nodes/arrow) -->
  <path
    d="M174 345 253 282 348 207 399 168"
    fill="none"
    stroke="#fff"
    stroke-width="31"
    stroke-linecap="butt"
    stroke-linejoin="round"
  />

  <!-- Relational nodes: white ring -->
  <g fill="#fff">
    <circle cx="174" cy="345" r="36"/>
    <circle cx="253" cy="282" r="36"/>
    <circle cx="348" cy="207" r="36"/>
  </g>

  <!-- Rising relational graph — solid teal line drawn over the nodes so it runs unbroken -->
  <path
    d="M174 345 253 282 348 207 399 168"
    fill="none"
    stroke="#1cc38c"
    stroke-width="16"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Node centers -->
  <g fill="#1cc38c">
    <circle cx="174" cy="345" r="27"/>
    <circle cx="253" cy="282" r="27"/>
    <circle cx="348" cy="207" r="27"/>
  </g>

  <!-- Arrow head -->
  <path
    d="M446 131 380 144 418 192 Z"
    fill="#1cc38c"
    stroke-linejoin="round"
  />
</svg>
